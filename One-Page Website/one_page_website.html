<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        section {
            padding: 40px;
        }

        img {
            width: 300px;
            height: 200px;
            margin: 10px;
            border-radius: 8px;
        }

        form {
            max-width: 400px;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 15px;
        }
        .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.9);
}

.modal-content {
    position: relative;
    margin: auto;
    margin-top: 40px;
    width: 80%;
    max-width: 900px;
}

.mySlides {
    display: none;
}

.mySlides img {
    width: 100%;
    border-radius: 8px;
}

.close {
    position: absolute;
    top: 15px;
    right: 35px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}

.prev,
.next {
    cursor: pointer;
    position: absolute;
    top: 45%;
    color: white;
    font-size: 40px;
    padding: 16px;
    user-select: none;
}

.prev {
    left: 0;
}

.next {
    right: 0;
}

#gallery img {
    cursor: pointer;
    transition: 0.3s;
}

#gallery img:hover {
    transform: scale(1.05);
}
    </style>
</head>
<body>

    <!-- Navigation with bookmarks -->
    <nav>
        <a href="#home">Home</a>
        <a href="#gallery">Photos</a>
        <a href="#videos">Videos</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Travel Destinations Around the World</h1>
        <p>
            Welcome to my travel website! Explore beautiful locations,
            view photos, watch travel videos, and contact me for more information.
        </p>
    </section>

   <!-- Photo Gallery -->
<section id="gallery">
    <h2>Photo Gallery</h2>

    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300"
         alt="Beach"
         onclick="openModal();currentSlide(1)">

    <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1?w=300"
         alt="Paris"
         onclick="openModal();currentSlide(2)">

    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300"
         alt="Mountains"
         onclick="openModal();currentSlide(3)">
</section>

    <!-- Video Section -->
    <section id="videos">
        <h2>Travel Videos</h2>

        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/Scxs7L0vhZ4"
            title="Travel Video"
            allowfullscreen>
        </iframe>
    </section>

    <!-- Contact Form -->
    <section id="contact">
        <h2>Contact Me</h2>

        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5"></textarea><br>

            <input type="submit" value="Submit">
        </form>
    </section>
    
    <!-- Lightbox Modal -->
<div id="myModal" class="modal">

    <span class="close cursor" onclick="closeModal()">&times;</span>

    <div class="modal-content">

        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200" style="width:100%">
        </div>

        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1?w=1200" style="width:100%">
        </div>

        <div class="mySlides">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200" style="width:100%">
        </div>

        <a class="prev" onclick="plusSlides(-1)">❮</a>
        <a class="next" onclick="plusSlides(1)">❯</a>

    </div>

</div>
    <!-- Footer -->
    <footer>
    <p>&copy; 2026 Travel Destinations Website</p>
</footer>

<script src="JS/one_page_website.js"></script>

</body>
</html>
