<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating CSS Effects</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header>
        <h1>Creating CSS Effects</h1>
        <p>Hover over the cards and button to see the effects.</p>
    </header>

    <section class="cards">

        <div class="card">
            <img src="https://picsum.photos/300/200?random=1" alt="Nature">
            <h2>Nature</h2>
            <p>Beautiful landscapes with smooth hover effects.</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=2" alt="Mountains">
            <h2>Mountains</h2>
            <p>CSS transitions make the page interactive.</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?random=3" alt="Ocean">
            <h2>Ocean</h2>
            <p>Transformations improve the user experience.</p>
        </div>

    </section>

    <div class="button-container">
        <button>Learn More</button>
    </div>

</body>
</html>
